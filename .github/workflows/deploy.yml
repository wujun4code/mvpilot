name: Deploy to Cloudflare Workers

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Resolve D1 database_id
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          # Try to create (ignore if already exists or no create permission)
          npx wrangler d1 create mvpilot 2>&1 || true

          # Use node to parse wrangler JSON output (strips banner noise reliably)
          DB_ID=$(npx wrangler d1 list --json 2>/dev/null | node -e "
            let d='';
            process.stdin.on('data',c=>d+=c);
            process.stdin.on('end',()=>{
              const m=d.match(/\[[\s\S]*\]/);
              if(!m){process.exit(0);}
              try {
                const rows=JSON.parse(m[0]);
                const r=rows.find(r=>r.name==='mvpilot');
                if(r) console.log(r.uuid||r.id||r.database_id||'');
              } catch(e){}
            });
          ")

          if [ -z "$DB_ID" ]; then
            echo "Could not determine D1 database_id from listing"
            exit 1
          fi

          echo "DB_ID=$DB_ID"
          sed -i "s/PLACEHOLDER_DATABASE_ID/$DB_ID/" wrangler.jsonc

      - name: Build
        run: npm run build

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}

      - name: Set Worker Secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          echo "${{ secrets.TELEGRAM_BOT_TOKEN }}"  | wrangler secret put TELEGRAM_BOT_TOKEN  --name mvpilot
          echo "${{ secrets.TELEGRAM_CHAT_ID }}"    | wrangler secret put TELEGRAM_CHAT_ID    --name mvpilot
          echo "${{ secrets.ADMIN_TOKEN }}"          | wrangler secret put ADMIN_TOKEN          --name mvpilot
          echo "https://mvpilot.aipromptor.com"      | wrangler secret put PUBLIC_BASE_URL      --name mvpilot
