name: Deploy to Cloudflare Workers

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Patch D1 database_id
        run: |
          sed -i "s/PLACEHOLDER_DATABASE_ID/${{ secrets.CF_D1_DATABASE_ID }}/" wrangler.jsonc

      - name: Build
        run: npm run build

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}

      - name: Run D1 migrations
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          npx wrangler d1 execute mvpilot --database-id=${{ secrets.CF_D1_DATABASE_ID }} --remote --command "
            CREATE TABLE IF NOT EXISTS ai_models (
              id TEXT PRIMARY KEY,
              name TEXT NOT NULL,
              api_endpoint TEXT NOT NULL,
              api_key TEXT NOT NULL,
              api_model TEXT NOT NULL,
              enabled INTEGER NOT NULL DEFAULT 1,
              is_default INTEGER NOT NULL DEFAULT 0,
              sort_order INTEGER NOT NULL DEFAULT 0,
              created_at TEXT NOT NULL DEFAULT (datetime('now'))
            );
            CREATE TABLE IF NOT EXISTS sessions (
              id TEXT PRIMARY KEY,
              created_at TEXT NOT NULL DEFAULT (datetime('now')),
              completed_at TEXT,
              contact_email TEXT,
              contact_wechat TEXT,
              contact_note TEXT,
              notified_at TEXT,
              plan_json TEXT,
              demo_status TEXT,
              demo_html TEXT,
              prd_markdown TEXT,
              product_type TEXT,
              saved_at TEXT,
              share_slug TEXT,
              story_status TEXT,
              story_html TEXT,
              locale TEXT NOT NULL DEFAULT 'en'
            );
            CREATE TABLE IF NOT EXISTS messages (
              id TEXT PRIMARY KEY,
              session_id TEXT NOT NULL REFERENCES sessions(id),
              role TEXT NOT NULL,
              content TEXT NOT NULL,
              created_at TEXT NOT NULL DEFAULT (datetime('now'))
            );
          "

      - name: Seed default AI models
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          npx wrangler d1 execute mvpilot --database-id=${{ secrets.CF_D1_DATABASE_ID }} --remote --command "
            INSERT OR IGNORE INTO ai_models (id, name, api_endpoint, api_key, api_model, enabled, is_default, sort_order)
            VALUES
              ('deepseek-v4-pro',   'DeepSeek V4 Pro',   'https://api.deepseek.com', '${{ secrets.DEEPSEEK_API_KEY }}', 'deepseek-chat',    1, 1, 0),
              ('deepseek-v4-flash', 'DeepSeek V4 Flash', 'https://api.deepseek.com', '${{ secrets.DEEPSEEK_API_KEY }}', 'deepseek-chat',    1, 0, 1);
          "

      - name: Set Worker Secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          echo "${{ secrets.TELEGRAM_BOT_TOKEN }}"  | npx wrangler secret put TELEGRAM_BOT_TOKEN  --name mvpilot
          echo "${{ secrets.TELEGRAM_CHAT_ID }}"    | npx wrangler secret put TELEGRAM_CHAT_ID    --name mvpilot
          echo "${{ secrets.ADMIN_TOKEN }}"          | npx wrangler secret put ADMIN_TOKEN          --name mvpilot
          echo "https://mvpilot.aipromptor.com"      | npx wrangler secret put PUBLIC_BASE_URL      --name mvpilot
