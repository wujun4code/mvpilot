name: Deploy to Cloudflare Workers

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Resolve D1 database_id
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          # Create D1 database if it doesn't exist (idempotent)
          npx wrangler d1 create mvpilot 2>&1 || true

          # Fetch database_id via Cloudflare REST API (avoids wrangler banner noise)
          DB_ID=$(curl -s "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/d1/database?name=mvpilot" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json" \
            | jq -r '.result[0].uuid // .result[0].id // empty')

          if [ -z "$DB_ID" ]; then
            echo "Could not determine D1 database_id"
            exit 1
          fi

          echo "DB_ID=$DB_ID"
          sed -i "s/PLACEHOLDER_DATABASE_ID/$DB_ID/" wrangler.jsonc

      - name: Build
        run: npm run build

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}

      - name: Set Worker Secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          echo "${{ secrets.TELEGRAM_BOT_TOKEN }}"  | wrangler secret put TELEGRAM_BOT_TOKEN  --name mvpilot
          echo "${{ secrets.TELEGRAM_CHAT_ID }}"    | wrangler secret put TELEGRAM_CHAT_ID    --name mvpilot
          echo "${{ secrets.ADMIN_TOKEN }}"          | wrangler secret put ADMIN_TOKEN          --name mvpilot
          echo "https://mvpilot.aipromptor.com"      | wrangler secret put PUBLIC_BASE_URL      --name mvpilot
