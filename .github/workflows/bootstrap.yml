name: Bootstrap D1 (run once)

on:
  workflow_dispatch:

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install wrangler
        run: npm install -g wrangler

      - name: Create D1 database & get database_id
        id: db
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          # Try to create (ignore error if already exists)
          wrangler d1 create mvpilot 2>&1 || true

          # Reliably fetch the database_id via list --json
          # wrangler may emit banner/telemetry lines before the JSON array;
          # extract only lines that look like a JSON array.
          RAW=$(wrangler d1 list --json 2>/dev/null)
          DB_ID=$(echo "$RAW" | python3 -c "
import sys, json, re
text = sys.stdin.read()
# find the first '[' ... ']' block in case of banner noise
m = re.search(r'\\[.*\\]', text, re.DOTALL)
if not m:
    sys.exit(0)
rows = json.loads(m.group(0))
for r in rows:
    v = r.get('uuid') or r.get('id') or r.get('database_id') or ''
    if r.get('name') == 'mvpilot' and v:
        print(v)
        break
" | head -1)

          echo "DB_ID=$DB_ID"
          if [ -z "$DB_ID" ]; then
            echo "❌ Could not determine database_id"
            exit 1
          fi

          echo "DB_ID=$DB_ID" >> $GITHUB_ENV
          echo "database_id=$DB_ID" >> $GITHUB_OUTPUT

      - name: Patch wrangler.jsonc with real database_id
        run: |
          sed -i "s/PLACEHOLDER_DATABASE_ID/$DB_ID/" wrangler.jsonc
          echo "✅ wrangler.jsonc patched:"
          cat wrangler.jsonc

      - name: Run D1 migrations (create tables)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          wrangler d1 execute mvpilot --database-id=$DB_ID --remote --command "
            CREATE TABLE IF NOT EXISTS ai_models (
              id TEXT PRIMARY KEY,
              name TEXT NOT NULL,
              api_endpoint TEXT NOT NULL,
              api_key TEXT NOT NULL,
              api_model TEXT NOT NULL,
              enabled INTEGER NOT NULL DEFAULT 1,
              is_default INTEGER NOT NULL DEFAULT 0,
              sort_order INTEGER NOT NULL DEFAULT 0,
              created_at TEXT NOT NULL DEFAULT (datetime('now'))
            );
            CREATE TABLE IF NOT EXISTS sessions (
              id TEXT PRIMARY KEY,
              created_at TEXT NOT NULL DEFAULT (datetime('now')),
              completed_at TEXT,
              contact_email TEXT,
              contact_wechat TEXT,
              contact_note TEXT,
              notified_at TEXT,
              plan_json TEXT,
              demo_status TEXT,
              demo_html TEXT,
              prd_markdown TEXT,
              product_type TEXT,
              saved_at TEXT,
              share_slug TEXT,
              story_status TEXT,
              story_html TEXT,
              locale TEXT NOT NULL DEFAULT 'en'
            );
            CREATE TABLE IF NOT EXISTS messages (
              id TEXT PRIMARY KEY,
              session_id TEXT NOT NULL REFERENCES sessions(id),
              role TEXT NOT NULL,
              content TEXT NOT NULL,
              created_at TEXT NOT NULL DEFAULT (datetime('now'))
            );
          "

      - name: Seed AI models into D1
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          wrangler d1 execute mvpilot --database-id=$DB_ID --remote --command "
            INSERT OR IGNORE INTO ai_models (id, name, api_endpoint, api_key, api_model, enabled, is_default, sort_order)
            VALUES
              ('deepseek-v4-pro',   'DeepSeek V4 Pro',   'https://api.deepseek.com', '${{ secrets.DEEPSEEK_API_KEY }}', 'deepseek-v4-pro',   1, 1, 0),
              ('deepseek-v4-flash', 'DeepSeek V4 Flash', 'https://api.deepseek.com', '${{ secrets.DEEPSEEK_API_KEY }}', 'deepseek-v4-flash', 1, 0, 1);
          "

      - name: Commit updated wrangler.jsonc
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add wrangler.jsonc
          git diff --cached --quiet || git commit -m "chore: fill in D1 database_id [skip ci]"
          git push
