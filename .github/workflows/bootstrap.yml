name: Bootstrap D1 (run once)

# Run this manually once to create the D1 database and fill in the database_id
# After that, only deploy.yml is needed for day-to-day deployments

on:
  workflow_dispatch:

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install wrangler
        run: npm install -g wrangler

      - name: Create D1 database (idempotent)
        id: create_db
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          OUTPUT=$(wrangler d1 create mvpilot 2>&1 || true)
          echo "$OUTPUT"
          # Extract database_id from output
          DB_ID=$(echo "$OUTPUT" | grep -oP '"database_id":\s*"\K[^"]+' | head -1)
          # If already exists, fetch it
          if [ -z "$DB_ID" ]; then
            DB_ID=$(wrangler d1 list --json 2>/dev/null | python3 -c "import sys,json; rows=json.load(sys.stdin); [print(r['uuid']) for r in rows if r['name']=='mvpilot']" | head -1)
          fi
          echo "DB_ID=$DB_ID" >> $GITHUB_ENV
          echo "database_id=$DB_ID" >> $GITHUB_OUTPUT
          echo "✅ D1 database_id: $DB_ID"

      - name: Patch wrangler.jsonc with real database_id
        run: |
          sed -i "s/PLACEHOLDER_DATABASE_ID/$DB_ID/" wrangler.jsonc
          echo "wrangler.jsonc updated:"
          cat wrangler.jsonc

      - name: Run D1 migrations (create tables)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          wrangler d1 execute mvpilot --remote --command "
            CREATE TABLE IF NOT EXISTS ai_models (
              id TEXT PRIMARY KEY,
              name TEXT NOT NULL,
              api_endpoint TEXT NOT NULL,
              api_key TEXT NOT NULL,
              api_model TEXT NOT NULL,
              enabled INTEGER NOT NULL DEFAULT 1,
              is_default INTEGER NOT NULL DEFAULT 0,
              sort_order INTEGER NOT NULL DEFAULT 0,
              created_at TEXT NOT NULL DEFAULT (datetime('now'))
            );
            CREATE TABLE IF NOT EXISTS sessions (
              id TEXT PRIMARY KEY,
              created_at TEXT NOT NULL DEFAULT (datetime('now')),
              completed_at TEXT,
              contact_email TEXT,
              contact_wechat TEXT,
              contact_note TEXT,
              notified_at TEXT,
              plan_json TEXT,
              demo_status TEXT,
              demo_html TEXT,
              prd_markdown TEXT,
              product_type TEXT,
              saved_at TEXT,
              share_slug TEXT,
              story_status TEXT,
              story_html TEXT,
              locale TEXT NOT NULL DEFAULT 'en'
            );
            CREATE TABLE IF NOT EXISTS messages (
              id TEXT PRIMARY KEY,
              session_id TEXT NOT NULL REFERENCES sessions(id),
              role TEXT NOT NULL,
              content TEXT NOT NULL,
              created_at TEXT NOT NULL DEFAULT (datetime('now'))
            );
          "

      - name: Seed AI models into D1
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          wrangler d1 execute mvpilot --remote --command "
            INSERT OR IGNORE INTO ai_models (id, name, api_endpoint, api_key, api_model, enabled, is_default, sort_order)
            VALUES
              ('deepseek-flash', 'DeepSeek-V4-flash', 'https://api.deepseek.com', '${{ secrets.DEEPSEEK_API_KEY }}', 'deepseek-v4-flash', 1, 1, 0),
              ('deepseek-v4-pro', 'DeepSeek-V4-Pro',  'https://api.deepseek.com', '${{ secrets.DEEPSEEK_API_KEY }}', 'deepseek-v4-pro',   1, 0, 1);
          "

      - name: Commit updated wrangler.jsonc
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add wrangler.jsonc
          git diff --cached --quiet || git commit -m "chore: fill in D1 database_id [skip ci]"
          git push
